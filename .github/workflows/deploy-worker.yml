name: Deploy Worker

# Requires repo secret: CLOUDFLARE_API_TOKEN (Workers Scripts:Edit).
# Worker secret (set once locally): npx wrangler secret put SLACK_BOT_TOKEN

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install Wrangler
        working-directory: worker
        run: npm install
      - name: Verify Cloudflare API token
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e9c5a793d46fd751dcb9e3b65620cb06
          workingDirectory: worker
          wranglerVersion: "4"
          command: whoami
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e9c5a793d46fd751dcb9e3b65620cb06
          workingDirectory: worker
          wranglerVersion: "4"
          command: deploy
      - name: Verify deployment
        run: |
          curl -fsS "https://ghoststack-proxy.greyhawkdiesel.workers.dev/version" | tee version.json
          grep -q 'slack-mirror-v3' version.json
