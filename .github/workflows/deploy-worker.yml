name: Deploy Worker

# Requires repo secret: CLOUDFLARE_API_TOKEN (Workers Scripts:Edit).
# Worker secret (set once locally): npx wrangler secret put SLACK_BOT_TOKEN

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          command: deploy
      - name: Verify deployment
        run: |
          curl -fsS "https://ghoststack-proxy.greyhawkdiesel.workers.dev/version" | tee version.json
          grep -q 'slack-mirror-v3' version.json
