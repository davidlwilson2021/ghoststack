name = "ghoststack-proxy"
main = "src/index.js"
compatibility_date = "2024-12-01"
account_id = "e9c5a793d46fd751dcb9e3b65620cb06"

workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "ghoststack-auth"
database_id = "f0986b1a-b903-407d-8040-25a18a1e7baf"
migrations_dir = "migrations"

# Purge expired sessions daily at 03:00 UTC.
# Triggers the `scheduled` handler in src/index.js.
[triggers]
crons = ["0 3 * * *"]
