name = "ghoststack-proxy"
main = "src/index.js"
compatibility_date = "2024-12-01"
# account_id — set via CLOUDFLARE_ACCOUNT_ID env var in CI, or uncomment
# and populate locally in wrangler.local.toml (gitignored).
# account_id = ""

workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "ghoststack-auth"
# database_id — set in wrangler.local.toml (gitignored) or via CI secret.
# See wrangler.local.toml.example for the template.
database_id = "REPLACE_WITH_DATABASE_ID"
migrations_dir = "migrations"

# Purge expired sessions daily at 03:00 UTC.
# Triggers the `scheduled` handler in src/index.js.
[triggers]
crons = ["0 3 * * *"]

# Non-secret runtime vars. Slack channel IDs and other identifiers
# that should not be in source go in wrangler.local.toml (gitignored).
[vars]
# SLACK_LOG_CHANNEL and SLACK_DISPATCH_CHANNEL are set in wrangler.local.toml
